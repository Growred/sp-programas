name: Atualizar Novidades SP

on:
  schedule:
    # Roda seg, qua e sex as 8h (horario de Brasilia = UTC-3)
    - cron: "0 11 * * 1,3,5"
  workflow_dispatch: # permite rodar manualmente

permissions:
  contents: write

jobs:
  fetch-suggestions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Buscar novidades
        run: python scripts/fetch_suggestions.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add suggestions.json
          git diff --staged --quiet || git commit -m "Atualizar novidades SP - $(date +'%d/%m/%Y %H:%M')"
          git push
